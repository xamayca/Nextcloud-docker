services:

  # Service - MariaDB database
  mariadb:
    container_name: nextcloud-mariadb
    image: mariadb:latest
    restart: always
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - backend-nextcloud

  # Service - Adminer
  adminer:
    container_name: nextcloud-adminer
    image: adminer:latest
    restart: always
    environment:
      ADMINER_DEFAULT_SERVER: mariadb
      ADMINER_DESIGN: ${ADMINER_DESIGN}
    ports:
      - "8081:80"
    networks:
      - backend-nextcloud
    depends_on:
      mariadb:
        condition: service_healthy

  # Service - Nextcloud
  nextcloud:
    container_name: nextcloud
    image: nextcloud:latest
    restart: always
    environment:
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_HOST: mariadb
    volumes:
      - html:/var/www/html
      - apps:/var/www/html/custom_apps
      - config:/var/www/html/config
      - data:/var/www/html/data
      - theme:/var/www/html/themes/${NEXTCLOUD_THEME_DIR_NAME}
    ports:
      - "8443:80"
    networks:
      - backend-nextcloud
    depends_on:
      mariadb:
        condition: service_healthy

# Shared volumes between services & host machine
volumes:
  mariadb_data:
  html:
  apps:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "${NEXTCLOUD_HOST_CUSTOM_APPS_DIR}"
  config:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "${NEXTCLOUD_HOST_CONFIG_DIR}"
  data:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "${NEXTCLOUD_HOST_DATA_DIR}"
  theme:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "${NEXTCLOUD_HOST_THEMES_DIR}/${NEXTCLOUD_THEME_DIR_NAME}"

# Shared networks between services
# (default Docker driver: bridge)
networks:
  backend-nextcloud:
    name: backend-nextcloud
    driver: bridge